# =============================================================================
# Toyhana — nginx config
#
# Шаблон с двумя серверами: HTTP (80) и HTTPS (443).
# До получения SSL-сертификата HTTPS-секция закомментирована — раскомментирует
# DevOps после успешного certbot certonly. См. README-deploy.md.
#
# Замените api.toyhana.kz на ваш реальный домен.
# =============================================================================

# --- Upstream: бэк в private docker-сети ---
upstream toyhana_backend {
    server backend:1500;
    keepalive 32;
}


# =============================================================================
# HTTP :80
#  - отдаёт ACME-challenge для Let's Encrypt
#  - всё остальное редиректит на HTTPS
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name _;   # позже заменить на api.toyhana.kz

    # ACME-challenge: certbot кладёт сюда токены, нам надо отдать их по HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ---- ВАРИАНТ A: пока нет HTTPS — проксируем напрямую ----
    # Закомментировать после получения сертификата.
    location / {
        client_max_body_size 25m;
        proxy_pass http://toyhana_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        alias /data/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---- ВАРИАНТ B: после Let's Encrypt — раскомментировать редирект ----
    # location / {
    #     return 301 https://$host$request_uri;
    # }
}


