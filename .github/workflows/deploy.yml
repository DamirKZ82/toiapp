name: Backend Docker Build & Push

# Запускается при пуше в main, если изменилось что-то в бэке или Docker-конфигах
on:
  push:
    branches: [main]
    paths:
      - 'toyhana-back/**'
      - 'docker-compose.yml'
      - 'nginx/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:   # позволяет запустить руками из вкладки Actions

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/toyhana-backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # для пуша в ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ./toyhana-back
          file: ./toyhana-back/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

